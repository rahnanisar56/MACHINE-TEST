<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.16.0/umd/popper.min.js"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <script srs="jquery"></script>
</head>
<body>
    <div class="container">
    <button type = "button" class = "btn btn-primary btn-lg my-5 " data-toggle="modal" data-target="#myModal" onclick="draw()">Primary Button</button>
    <p id="result" class="text-danger"></p>
     <div class="modal fade" id="myModal">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h4 class="modal-title">Lottery Winner</h4>
          <button type="button" class="close" data-dismiss="modal">&times;</button>
        </div>
        <div class="modal-body">
          Winner is <span id="modalResult"></span>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
        </div>
        </div>
    </div>
  </div>
    </div>
    <script>
        let lottery  = [12234,22456,32214,54430,88643]
        function draw(){
            let randomTicket = Math.floor(Math.random()*lottery.length)
            let winner = lottery[randomTicket]
            document.getElementById("result").innerHTML = "Winner is "+winner
            console.log(`Winner is ${winner}`)
            document.getElementById("modalResult").innerHTML=winner
            
        }
    </script>
</body>
</html>
